<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Staking Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      margin: 0;
      padding: 0;
    }
    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
    }
    .container {
      display: flex;
      justify-content: space-around;
      margin: 40px;
    }
    .panel {
      background: #1e293b;
      border-radius: 10px;
      padding: 20px;
      width: 30%;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .panel h2 {
      margin-top: 0;
      color: #38bdf8;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }
    input {
      background: #334155;
      color: #f1f5f9;
    }
    button {
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>
  <header>My Staking Dashboard</header>
  <div class="container">
    <div class="panel">
      <h2>Deposit</h2>
      <input type="number" placeholder="Amount to deposit">
      <button onclick="deposit()">Deposit</button>
    </div>
    <div class="panel">
      <h2>Stake</h2>
      <input type="number" placeholder="Amount to stake">
      <button onclick="stake()">Stake</button>
    </div>
    <div class="panel">
      <h2>Withdraw</h2>
      <input type="number" placeholder="Amount to withdraw">
      <button onclick="withdraw()">Withdraw</button>
    </div>
  </div>

  <script>
    function deposit() {
      alert("Deposit action triggered!");
      // TODO: connect to backend
    }
    function stake() {
      alert("Stake action triggered!");
      // TODO: connect to backend
    }
    function withdraw() {
      alert("Withdraw action triggered!");
      // TODO: connect to backend
    }
  </script>
</body>
</html>
