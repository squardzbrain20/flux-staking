<!DOCTYPE html>
<html lang="en">
<head>
    <script type="module">
        // ... (Keep your existing Firebase Config and init code) ...

        // NEW: Withdrawal Function
        window.requestWithdrawal = async () => {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const address = document.getElementById('withdrawAddr').value;

            if (!amount || amount < 5) { tg.showAlert("Minimum withdrawal is $5.00"); return; }
            if (address.length < 10) { tg.showAlert("Please enter a valid TON address."); return; }

            const userDoc = doc(db, "users", userId.toString());
            const docSnap = await getDoc(userDoc);
            const currentBalance = docSnap.data().balance;

            if (currentBalance < amount) {
                tg.showAlert("Insufficient balance.");
            } else {
                tg.showConfirm(`Withdraw $${amount} to ${address.substring(0,6)}...?`, async (ok) => {
                    if(ok) {
                        tg.showProgress();
                        // 1. Subtract from balance
                        await updateDoc(userDoc, { balance: increment(-amount) });
                        
                        // 2. Log the request for Admin (You) to see
                        const requestRef = doc(db, "withdrawals", Date.now().toString());
                        await setDoc(requestRef, {
                            userId: userId,
                            username: tg.initDataUnsafe?.user?.username || "Unknown",
                            amount: amount,
                            address: address,
                            status: "PENDING",
                            date: new Date()
                        });

                        tg.hideProgress();
                        tg.showAlert("✅ Withdrawal Request Sent! Processed within 24 hours.");
                        showScreen('home-screen');
                        loadUserData();
                    }
                });
            }
        };
    </script>

    <style>
        /* ... (Keep your existing styles) ... */
        .withdraw-input { width: 100%; padding: 15px; margin: 10px 0; background: #161b22; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="withdraw-screen" class="screen">
        <div class="header"><h2>Withdraw Funds</h2><p style="color: var(--gray);">Available: <span id="withdraw-bal-display">$0.00</span></p></div>
        <label style="font-size: 12px; color: var(--gray);">Amount to Withdraw ($)</label>
        <input type="number" id="withdrawAmount" class="withdraw-input" placeholder="e.g. 50">
        
        <label style="font-size: 12px; color: var(--gray);">Your Destination TON Address</label>
        <input type="text" id="withdrawAddr" class="withdraw-input" placeholder="Paste your wallet address here">
        
        <button class="btn-pay" onclick="requestWithdrawal()">CONFIRM WITHDRAWAL</button>
        <p onclick="showScreen('home-screen')" style="text-align: center; color: var(--gray); margin-top: 20px;">← Back to Wallet</p>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="showScreen('home-screen')">👛<br>Wallet</div>
        <div class="nav-item" onclick="showScreen('profit-screen')">📈<br>Profit</div>
        <div class="nav-item" onclick="showScreen('withdraw-screen')">📤<br>Withdraw</div>
    </div>

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            // Update balance display on withdraw screen
            if(id === 'withdraw-screen') {
                document.getElementById('withdraw-bal-display').innerText = document.getElementById('display-balance').innerText;
            }
        }
    </script>
</body>
</html>
