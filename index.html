<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flux Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg-obsidian: #05070a;
            --card-bg: #0f121a;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-gray: #8a8f98;
        }
        body { background-color: var(--bg-obsidian); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .screen { display: none; padding-bottom: 80px; min-height: 100vh; }
        .screen.active { display: block; }
        
        .header { padding: 20px; text-align: center; }
        .balance-amount { font-size: 32px; font-weight: bold; }
        .chart-container { width: 100%; height: 180px; }
        
        .actions-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .action-btn { background: var(--card-bg); border: 1px solid #1f232d; border-radius: 12px; padding: 15px 5px; text-align: center; color: white; cursor: pointer; font-size: 12px;}
        
        /* Gas Screen Specifics */
        .input-group { padding: 20px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #161b22; color: white; font-size: 18px; box-sizing: border-box; }
        .gas-result { margin-top: 20px; padding: 15px; background: rgba(157, 80, 187, 0.1); border-radius: 10px; border: 1px dashed var(--neon-purple); text-align: center; }
        .btn-main { width: 100%; padding: 15px; border-radius: 10px; border: none; background: linear-gradient(90deg, #00d2ff, #9d50bb); color: white; font-weight: bold; cursor: pointer; margin-top: 20px;}

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0d14; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1f232d; }
        .nav-item { color: var(--text-gray); font-size: 12px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--neon-blue); }
        #ton-connect-button { display: none; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="header">
            <div style="color: var(--text-gray);">Total Assets</div>
            <div class="balance-amount">$0.00</div>
            <div id="wallet-status" style="font-size: 10px; color: #ffcc00;">Not Connected</div>
        </div>
        <div class="chart-container"><canvas id="balanceChart"></canvas></div>
        <div class="actions-grid">
            <div class="action-btn" id="custom-connect" onclick="connectWallet()">🔗<br>Connect</div>
            <div class="action-btn" onclick="showScreen('gas-screen')">⛽<br>Gas</div>
            <div class="action-btn">💸<br>Withdraw</div>
            <div class="action-btn">🕒<br>History</div>
        </div>
        <div id="ton-connect-button"></div>
    </div>

    <div id="gas-screen" class="screen">
        <div class="header">
            <h2>Gas Station</h2>
            <p style="color: var(--text-gray);">3% Fee for Activation</p>
        </div>
        <div class="input-group">
            <label style="font-size: 12px; color: var(--text-gray);">Investment Amount ($)</label>
            <input type="number" id="investAmount" placeholder="100" oninput="calcGas()">
            
            <div class="gas-result">
                <div style="font-size: 12px; color: var(--text-gray);">Estimated Gas Fee</div>
                <div id="gasValue" style="font-size: 24px; font-weight: bold; color: var(--neon-blue);">$0.00</div>
            </div>

            <button class="btn-main" onclick="processGas()">PAY GAS NOW</button>
            <p onclick="showScreen('home-screen')" style="text-align: center; color: var(--text-gray); font-size: 12px; margin-top: 20px;">← Back to Home</p>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showScreen('home-screen')">🏠<br>Home</div>
        <div class="nav-item" onclick="showScreen('gas-screen')">⛽<br>Gas</div>
        <div class="nav-item">📈<br>Profit</div>
        <div class="nav-item">👤<br>Profile</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Wallet Logic
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://squardzbrain20.github.io/flux-staking/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function connectWallet() {
            try { await tonConnectUI.openModal(); } catch (e) { console.error(e); }
        }

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                document.getElementById('wallet-status').innerText = "Connected ✅";
                document.getElementById('wallet-status').style.color = "#00ff88";
                document.getElementById('custom-connect').innerHTML = "⚙️<br>Wallet";
            }
        });

        // App Logic
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Update Nav visual
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            if(id === 'home-screen') document.querySelector('.nav-item:nth-child(1)').classList.add('active');
            if(id === 'gas-screen') document.querySelector('.nav-item:nth-child(2)').classList.add('active');
        }

        function calcGas() {
            const val = document.getElementById('investAmount').value;
            document.getElementById('gasValue').innerText = `$${(val * 0.03).toFixed(2)}`;
        }

        function processGas() {
            const gas = document.getElementById('gasValue').innerText;
            if (gas === "$0.00") {
                tg.showAlert("Please enter an amount first.");
                return;
            }
            tg.showConfirm(`Proceed to pay ${gas} Gas fee?`, (ok) => {
                if(ok) tg.showAlert("Processing transaction via your connected wallet...");
            });
        }

        // Chart
        const ctx = document.getElementById('balanceChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1', '2', '3', '4', '5', '6', '7'],
                datasets: [{
                    data: [11000, 11500, 11200, 12000, 11800, 12300, 12457],
                    borderColor: '#9d50bb',
                    borderWidth: 3, tension: 0.4, fill: false, pointRadius: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    </script>
</body>
</html>
