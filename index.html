<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flux Live Wallet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your specific config
        const firebaseConfig = {
            apiKey: "AIzaSyDrlgK_EyEJhuhLwG4iqmrWqXN2cam7azQ",
            authDomain: "flux-staking.firebaseapp.com",
            projectId: "flux-staking",
            storageBucket: "flux-staking.firebasestorage.app",
            messagingSenderId: "187171802936",
            appId: "1:187171802936:web:3425417a6c1ec561077bcd",
            measurementId: "G-F3ZSEHZ8WS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || "demo_user";

        // Function to load or create user in Database
        async function loadUserData() {
            const userDoc = doc(db, "users", userId.toString());
            const docSnap = await getDoc(userDoc);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('display-balance').innerText = `$${data.balance.toFixed(2)}`;
                document.getElementById('user-addr').innerText = data.walletAddress;
            } else {
                // First time user: Create their record
                const newAddress = "TY" + Math.random().toString(36).substring(2, 12).toUpperCase();
                await setDoc(userDoc, {
                    balance: 0.00,
                    walletAddress: newAddress,
                    username: tg.initDataUnsafe?.user?.username || "Unknown",
                    createdAt: new Date()
                });
                document.getElementById('display-balance').innerText = "$0.00";
                document.getElementById('user-addr').innerText = newAddress;
            }
        }

        // Handle Product Purchases
        window.buyProduct = async (price, name) => {
            const userDoc = doc(db, "users", userId.toString());
            const docSnap = await getDoc(userDoc);
            const currentBalance = docSnap.data().balance;

            if (currentBalance < price) {
                tg.showAlert("❌ Insufficient funds. Please deposit to your Flux TRC20 address.");
            } else {
                tg.showConfirm(`Activate 30-day ${name} Plan for $${price}?`, async (ok) => {
                    if(ok) {
                        tg.showProgress();
                        await updateDoc(userDoc, { balance: increment(-price) });
                        setTimeout(() => {
                            tg.hideProgress();
                            tg.showAlert(`✅ ${name} Activated! Your yield is now generating.`);
                            loadUserData();
                        }, 2000);
                    }
                });
            }
        };

        window.onload = loadUserData;
    </script>

    <style>
        :root {
            --bg-obsidian: #05070a;
            --card-bg: #0f121a;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-gray: #8a8f98;
        }
        body { background-color: var(--bg-obsidian); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .screen { display: none; padding-bottom: 100px; min-height: 100vh; }
        .screen.active { display: block; }
        .wallet-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #1f232d; }
        .main-balance { font-size: 40px; font-weight: bold; margin: 10px 0; }
        .address-section { margin: 20px; padding: 15px; background: #0a0d14; border: 1px dashed #30363d; border-radius: 12px; cursor: pointer; }
        .addr-text { font-family: monospace; font-size: 11px; color: var(--neon-blue); margin-top: 5px; word-break: break-all; }
        .product-card { background: var(--card-bg); border: 1px solid #1f232d; border-radius: 16px; margin: 10px 20px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .invest-btn { background: var(--neon-blue); color: black; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0d14; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1f232d; }
        .nav-item { color: var(--text-gray); font-size: 12px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--neon-blue); }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="wallet-header">
            <div style="color: var(--text-gray); font-size: 14px;">Total Flux Balance</div>
            <div class="main-balance" id="display-balance">$0.00</div>
            <div class="address-section" onclick="copyAddress()">
                <div style="font-size: 11px; color: var(--text-gray);">Your Unique Deposit Address (TRC20)</div>
                <div class="addr-text" id="user-addr">Loading...</div>
                <div style="font-size: 10px; color: var(--text-gray); margin-top: 5px;">Tap to copy</div>
            </div>
        </div>
        <div style="padding: 20px;"><canvas id="balanceChart" style="height: 120px;"></canvas></div>
    </div>

    <div id="profit-screen" class="screen">
        <div class="header" style="text-align: center; padding: 20px;"><h2>Yield Markets</h2></div>
        <div class="product-card">
            <div><div style="font-weight: bold;">Binance Plan</div><div style="font-size: 12px; color: var(--text-gray);">Price: $10.00</div></div>
            <button class="invest-btn" onclick="buyProduct(10, 'Binance')">Buy</button>
        </div>
        <div class="product-card">
            <div><div style="font-weight: bold;">Bitget Alpha</div><div style="font-size: 12px; color: var(--text-gray);">Price: $100.00</div></div>
            <button class="invest-btn" onclick="buyProduct(100, 'Bitget')">Buy</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showScreen('home-screen')">👛<br>Wallet</div>
        <div class="nav-item" onclick="showScreen('profit-screen')">📈<br>Profit</div>
        <div class="nav-item" onclick="window.Telegram.WebApp.showAlert('Gas is automatically deducted from your balance.')">⛽<br>Gas</div>
    </div>

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        }
        function copyAddress() {
            const addr = document.getElementById('user-addr').innerText;
            navigator.clipboard.writeText(addr);
            window.Telegram.WebApp.showAlert("Address Copied!");
        }
        const ctx = document.getElementById('balanceChart').getContext('2d');
        new Chart(ctx, { type: 'line', data: { labels: ['','','','','',''], datasets: [{ data: [0, 0, 0, 0, 0, 0], borderColor: '#00d2ff', borderWidth: 2, pointRadius: 0, fill: false }] }, options: { scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } } });
    </script>
</body>
</html>
