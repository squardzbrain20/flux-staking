<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flux Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-obsidian: #05070a;
            --card-bg: #0f121a;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-gray: #8a8f98;
        }

        body {
            background-color: var(--bg-obsidian);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
        }

        .screen { display: none; padding-bottom: 80px; }
        .screen.active { display: block; }

        /* Header & Balance */
        .header { padding: 20px; text-align: center; }
        .balance-amount { font-size: 32px; font-weight: bold; margin: 0; }
        .chart-container { width: 100%; height: 180px; }

        /* Actions Grid */
        .actions-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .action-btn { background: var(--card-bg); border: 1px solid #1f232d; border-radius: 12px; padding: 15px 5px; text-align: center; color: white; cursor: pointer;}
        .action-btn.active { border-color: var(--neon-blue); background: rgba(0, 210, 255, 0.1); }

        /* Input Styles for Gas Screen */
        .input-group { padding: 20px; }
        input {
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #1f232d;
            background: #161b22; color: white; font-size: 18px; box-sizing: border-box;
        }
        .gas-result { margin-top: 20px; padding: 15px; background: rgba(157, 80, 187, 0.1); border-radius: 10px; border: 1px dashed var(--neon-purple); text-align: center; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0d14; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1f232d; }
        .nav-item { color: var(--text-gray); font-size: 12px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--neon-blue); }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="header">
            <div style="color: var(--text-gray);">Total Balance</div>
            <div class="balance-amount">$12,457.89</div>
            <div style="color: #00ff88;">+10.86% (30d)</div>
        </div>
        <div class="chart-container"><canvas id="balanceChart"></canvas></div>
        <div class="actions-grid">
            <div class="action-btn" onclick="showScreen('gas-screen')">⛽<br>Gas</div>
            <div class="action-btn">🌙<br>Profit</div>
            <div class="action-btn">🕒<br>History</div>
            <div class="action-btn">⚙️<br>Settings</div>
        </div>
    </div>

    <div id="gas-screen" class="screen">
        <div class="header">
            <h2>Gas Station</h2>
            <p style="color: var(--text-gray);">Calculate your 3% activation fee</p>
        </div>
        <div class="input-group">
            <label>Investment Amount (USDT)</label>
            <input type="number" id="investAmount" placeholder="Enter amount (min $10)" oninput="calcGas()">
            
            <div class="gas-result">
                <div style="font-size: 14px; color: var(--text-gray);">Required Gas (3%)</div>
                <div id="gasValue" style="font-size: 24px; font-weight: bold; color: var(--neon-blue);">$0.00</div>
            </div>

            <button style="width: 100%; margin-top: 20px; padding: 15px; border-radius: 10px; border: none; background: linear-gradient(90deg, #00d2ff, #9d50bb); color: white; font-weight: bold;">
                PURCHASE GAS
            </button>
            <p style="text-align: center; font-size: 12px; color: var(--text-gray); cursor: pointer;" onclick="showScreen('home-screen')">← Back to Home</p>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showScreen('home-screen')">🏠<br>Home</div>
        <div class="nav-item" onclick="showScreen('gas-screen')">⛽<br>Gas</div>
        <div class="nav-item">📈<br>Profit</div>
        <div class="nav-item">👤<br>Profile</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Screen Switcher
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // 3% Gas Calculation
        function calcGas() {
            const amount = document.getElementById('investAmount').value;
            const gas = (amount * 0.03).toFixed(2);
            document.getElementById('gasValue').innerText = `$${gas}`;
        }

        // Chart Initialization
        const ctx = document.getElementById('balanceChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1', '2', '3', '4', '5', '6', '7'],
                datasets: [{
                    data: [11000, 11500, 11200, 12000, 11800, 12300, 12457],
                    borderColor: '#9d50bb',
                    borderWidth: 3, tension: 0.4, fill: false, pointRadius: 0
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { display: false } }
            }
        });
    </script>
</body>
</html>
