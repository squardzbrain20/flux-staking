<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flux Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg-obsidian: #05070a;
            --card-bg: #0f121a;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-gray: #8a8f98;
        }
        body { background-color: var(--bg-obsidian); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .screen { display: none; padding-bottom: 80px; min-height: 100vh; }
        .screen.active { display: block; }
        .header { padding: 20px; text-align: center; }
        .balance-amount { font-size: 32px; font-weight: bold; }
        .chart-container { width: 100%; height: 180px; }
        .actions-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .action-btn { background: var(--card-bg); border: 1px solid #1f232d; border-radius: 12px; padding: 15px 5px; text-align: center; color: white; cursor: pointer;}
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0d14; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1f232d; }
        .nav-item { color: var(--text-gray); font-size: 12px; text-align: center; cursor: pointer; }
        /* Hidden TonConnect button but required for logic */
        #ton-connect-button { display: none; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="header">
            <div style="color: var(--text-gray);">Total Assets</div>
            <div class="balance-amount">$0.00</div>
            <div id="wallet-status" style="font-size: 10px; color: #ffcc00;">Not Connected</div>
        </div>
        <div class="chart-container"><canvas id="balanceChart"></canvas></div>
        
        <div class="actions-grid">
            <div class="action-btn" id="custom-connect" onclick="connectWallet()">🔗<br>Connect</div>
            <div class="action-btn" onclick="showScreen('gas-screen')">⛽<br>Gas</div>
            <div class="action-btn">💸<br>Withdraw</div>
            <div class="action-btn">🕒<br>History</div>
        </div>
        
        <div id="ton-connect-button"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Initialize TonConnect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://squardzbrain20.github.io/flux-staking/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function connectWallet() {
            try {
                const connectedWallet = await tonConnectUI.openModal();
            } catch (e) {
                console.error("Connection error", e);
            }
        }

        // Listen for wallet changes
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                document.getElementById('wallet-status').innerText = "Connected ✅";
                document.getElementById('wallet-status').style.color = "#00ff88";
                document.getElementById('custom-connect').innerHTML = "⚙️<br>Wallet";
            }
        });

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Chart Init
        const ctx = document.getElementById('balanceChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1', '2', '3', '4', '5', '6', '7'],
                datasets: [{
                    data: [0, 0, 0, 0, 0, 0, 0],
                    borderColor: '#9d50bb',
                    borderWidth: 3, tension: 0.4, fill: false, pointRadius: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    </script>
</body>
</html>
