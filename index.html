<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flux Wallet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-obsidian: #05070a;
            --card-bg: #0f121a;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-gray: #8a8f98;
        }
        body { background-color: var(--bg-obsidian); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .screen { display: none; padding-bottom: 100px; min-height: 100vh; }
        .screen.active { display: block; }
        
        /* Wallet Header */
        .wallet-header { padding: 30px 20px; text-align: center; background: linear-gradient(180deg, #0f121a 0%, #05070a 100%); }
        .balance-label { color: var(--text-gray); font-size: 14px; }
        .main-balance { font-size: 40px; font-weight: bold; margin: 10px 0; letter-spacing: -1px; }
        
        /* Action Buttons */
        .wallet-actions { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; background: #161b22; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #30363d; cursor: pointer; transition: 0.3s; }
        .circle-btn:active { transform: scale(0.9); background: var(--neon-blue); }
        .btn-label { font-size: 11px; color: var(--text-gray); margin-top: 8px; }

        /* Address Box */
        .address-section { margin: 0 20px; padding: 15px; background: #0a0d14; border: 1px dashed #30363d; border-radius: 12px; text-align: center; }
        .addr-text { font-family: monospace; font-size: 12px; color: var(--neon-blue); margin-top: 5px; word-break: break-all; }

        /* Product Cards */
        .product-card { background: var(--card-bg); border: 1px solid #1f232d; border-radius: 16px; margin: 10px 20px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .yield-badge { color: #00ff88; font-weight: bold; font-size: 12px; }
        .invest-btn { background: var(--neon-blue); color: black; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0d14; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1f232d; z-index: 1000;}
        .nav-item { color: var(--text-gray); font-size: 12px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--neon-blue); }
        
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #161b22; color: white; font-size: 18px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="wallet-header">
            <div class="balance-label">Available Balance</div>
            <div class="main-balance" id="display-balance">$0.00</div>
            
            <div class="wallet-actions">
                <div style="text-align: center;" onclick="tg.showAlert('Send USDT (TRC20) to your address below.')">
                    <div class="circle-btn">📥</div>
                    <div class="btn-label">Deposit</div>
                </div>
                <div style="text-align: center;" onclick="showScreen('withdraw-screen')">
                    <div class="circle-btn">📤</div>
                    <div class="btn-label">Withdraw</div>
                </div>
            </div>

            <div class="address-section" onclick="copyAddress()">
                <div style="font-size: 11px; color: var(--text-gray);">Your Flux Wallet Address (TRC20)</div>
                <div class="addr-text" id="user-addr">TLoadingAddress...</div>
                <div style="font-size: 10px; color: var(--text-gray); margin-top: 5px;">(Tap to copy)</div>
            </div>
        </div>

        <div style="padding: 20px;"><canvas id="balanceChart" style="height: 120px;"></canvas></div>
    </div>

    <div id="profit-screen" class="screen">
        <div class="header" style="text-align: center; padding: 20px;"><h2>Profit Tiers</h2></div>
        <div id="products">
            <div class="product-card">
                <div><div style="font-weight: bold;">Binance Plan</div><div style="font-size: 12px; color: var(--text-gray);">Price: $10.00</div></div>
                <div style="text-align: right;"><div class="yield-badge">20% Monthly</div><button class="invest-btn" onclick="buyProduct(10, 'Binance')">Buy</button></div>
            </div>
            <div class="product-card">
                <div><div style="font-weight: bold;">Bitget Plan</div><div style="font-size: 12px; color: var(--text-gray);">Price: $100.00</div></div>
                <div style="text-align: right;"><div class="yield-badge">20% Monthly</div><button class="invest-btn" onclick="buyProduct(100, 'Bitget')">Buy</button></div>
            </div>
        </div>
    </div>

    <div id="withdraw-screen" class="screen">
        <div class="header" style="text-align: center; padding: 20px;"><h2>Withdraw Funds</h2></div>
        <div style="padding: 20px;">
            <input type="text" placeholder="Recipient TRC20 Address" style="margin-bottom: 10px;">
            <input type="number" placeholder="Amount to Withdraw" id="withdraw-amt">
            <button style="width: 100%; margin-top: 20px; padding: 15px; border-radius: 10px; border: none; background: #ff4757; color: white; font-weight: bold;" onclick="handleWithdraw()">Confirm Withdrawal</button>
            <p onclick="showScreen('home-screen')" style="text-align: center; color: var(--text-gray); margin-top: 20px;">Cancel</p>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showScreen('home-screen')">👛<br>Wallet</div>
        <div class="nav-item" onclick="showScreen('profit-screen')">📈<br>Profit</div>
        <div class="nav-item" onclick="tg.showAlert('Gas is automatically deducted from your wallet balance during purchase.')">⛽<br>Gas</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = 0.00; // This would normally come from your database

        // Simulated unique address for Charles
        const charlesAddress = "TY5p6W8mD9sXk7" + Math.floor(Math.random() * 100000);
        document.getElementById('user-addr').innerText = charlesAddress;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        }

        function copyAddress() {
            navigator.clipboard.writeText(charlesAddress);
            tg.showAlert("Address copied! Deposit funds to see them in your balance.");
        }

        function buyProduct(price, name) {
            if (balance < price) {
                tg.showConfirm(`Insufficient balance. Would you like to buy $${price} Gas to activate?`, (ok) => {
                    if(ok) tg.showAlert("Please deposit funds to your wallet first.");
                });
            } else {
                tg.showConfirm(`Confirm purchase of ${name} for $${price}?`, (ok) => {
                    if(ok) {
                        balance -= price;
                        updateUI();
                        tg.showAlert("Purchase successful! Your yields are now generating.");
                    }
                });
            }
        }

        function handleWithdraw() {
            const amt = document.getElementById('withdraw-amt').value;
            if (amt > balance || amt <= 0) {
                tg.showAlert("Invalid or insufficient amount.");
            } else {
                tg.showConfirm(`Withdraw $${amt}?`, (ok) => {
                    if(ok) {
                        balance -= amt;
                        updateUI();
                        tg.showAlert("Withdrawal initiated! Funds will arrive shortly.");
                        showScreen('home-screen');
                    }
                });
            }
        }

        function updateUI() {
            document.getElementById('display-balance').innerText = `$${balance.toFixed(2)}`;
        }

        // Simple Chart Init
        const ctx = document.getElementById('balanceChart').getContext('2d');
        new Chart(ctx, { type: 'line', data: { labels: ['','','','','',''], datasets: [{ data: [0, 0, 0, 0, 0, 0], borderColor: '#00d2ff', borderWidth: 2, pointRadius: 0, fill: false }] }, options: { scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } } });
    </script>
</body>
</html>
